<!DOCTYPE html>

      <p id="creator-title" class="creator-title">Personal Blog • Video Editor • Photographer</p>
      <p id="creator-intro" class="creator-intro">
        Personal blog capturing cinematic moments through photography and professional video editing.

      <a href="https://instagram.com/yashwinn.___" target="_blank" rel="noopener noreferrer" class="social-card" id="btn-instagram">
        <div class="card-left">
          <div class="icon-box">
            <img src="instagram.png" alt="Instagram" style="display: none;" onload="this.style.display='block'; if(this.nextElementSibling) this.nextElementSibling.style.display='none';" />
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-instagram">

          </div>
          <div class="card-details">
            <span class="card-label">Instagram</span>
            <span class="card-handle">@yashwinn.___</span>

        </div>
        <div class="card-right">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-arrow-right">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>

            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-youtube">

            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </div>

      <!-- Gmail Card -->
      <a href="https://mail.google.com/mail/?view=cm&fs=1&to=yashwin@gmail.com" target="_blank" rel="noopener noreferrer" class="social-card" id="btn-gmail">
        <div class="card-left">
          <div class="icon-box">
            <img src="gmail.png" alt="Gmail" style="display: none;" onload="this.style.display='block'; if(this.nextElementSibling) this.nextElementSibling.style.display='none';" />
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-mail">

        <div class="card-right">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-arrow-right">
